name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release archive
        run: |
          mkdir -p /tmp/variable-picker
          rsync -a --exclude node_modules --exclude .git --exclude .github --exclude src --exclude .idea . /tmp/variable-picker/
          cd /tmp
          zip -r ${{ github.workspace }}/variable-picker.zip variable-picker

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: variable-picker.zip
          generate_release_notes: true
